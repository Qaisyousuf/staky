<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Option B: Arrow Through Stack -->
  <!-- Left stack (US, gray) → arrow → Right stack (EU, green) -->

  <!-- Left stack -->
  <rect x="8" y="28" width="36" height="13" rx="6.5" fill="#CBD5E1"/>
  <rect x="8" y="46" width="36" height="13" rx="6.5" fill="#94A3B8"/>
  <rect x="8" y="64" width="36" height="13" rx="6.5" fill="#64748B"/>

  <!-- Arrow -->
  <line x1="52" y1="60" x2="68" y2="60" stroke="#0F6E56" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M63 53 L70 60 L63 67" stroke="#0F6E56" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right stack (EU, green) -->
  <rect x="76" y="28" width="36" height="13" rx="6.5" fill="#0F6E56" opacity="0.35"/>
  <rect x="76" y="46" width="36" height="13" rx="6.5" fill="#0F6E56" opacity="0.65"/>
  <rect x="76" y="64" width="36" height="13" rx="6.5" fill="#0F6E56"/>
</svg>
